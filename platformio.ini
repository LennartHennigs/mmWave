[env:seeed_xiao_esp32c6_ota]
extends = env:seeed_xiao_esp32c6
upload_protocol = espota
upload_port = mmwave.local      ; or the device IP address

[env:seeed_xiao_esp32c6]
; pioarduino platform bundles Arduino-ESP32 3.x with full ESP32-C6 support.
; The official espressif32 platform ships Arduino-ESP32 2.x which has no C6 Arduino support.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200
; Hold BOOT then connect USB (or press RESET) to enter download mode before uploading
upload_protocol = esptool
upload_resetmethod = nodemcu
board_build.partitions = min_spiffs.csv   ; 1.9 MB app (vs 1.25 MB default), keeps OTA
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
lib_deps =
    knolleary/PubSubClient @ ^2.8
    https://github.com/Love4yzp/Seeed-mmWave-library
    https://github.com/ESP32Async/AsyncTCP
    https://github.com/ESP32Async/ESPAsyncWebServer
    tzapu/WiFiManager @ ^2.0
    https://github.com/LennartHennigs/ESPTelnet
    claws/BH1750 @ ^1.3.0
    adafruit/Adafruit NeoPixel @ ^1.12.3
